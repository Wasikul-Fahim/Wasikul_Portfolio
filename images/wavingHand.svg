<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform-origin="50 50">
    <animate 
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="-20"
      to="20"
      dur="0.5s"
      repeatCount="indefinite"
      additive="sum"
      direction="alternate"
    />
    <text x="30" y="70" font-size="60">👋</text>
  </g>
</svg>